<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="100" ry="100" fill="url(#bgGrad)"/>

  <!-- Scaffold - neon style -->
  <line x1="155" y1="140" x2="155" y2="400" stroke="url(#barGrad)" stroke-width="10" stroke-linecap="round"/>
  <line x1="357" y1="140" x2="357" y2="400" stroke="url(#barGrad)" stroke-width="10" stroke-linecap="round"/>

  <line x1="155" y1="190" x2="357" y2="190" stroke="#f5576c" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <line x1="155" y1="270" x2="357" y2="270" stroke="#f093fb" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <line x1="155" y1="350" x2="357" y2="350" stroke="#f5576c" stroke-width="4" stroke-linecap="round" opacity="0.4"/>

  <line x1="155" y1="190" x2="256" y2="270" stroke="#f093fb" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <line x1="256" y1="190" x2="155" y2="270" stroke="#f093fb" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <line x1="256" y1="270" x2="357" y2="350" stroke="#f093fb" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <line x1="357" y1="270" x2="256" y2="350" stroke="#f093fb" stroke-width="3" stroke-linecap="round" opacity="0.3"/>

  <!-- S -->
  <text x="256" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="170" font-weight="900" fill="url(#sGrad)" text-anchor="middle" dominant-baseline="central" filter="url(#glow)">S</text>

  <!-- Cursor -->
  <rect x="318" y="210" width="6" height="36" rx="3" fill="#f093fb" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.1;0.8" dur="1.0s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating particles -->
  <circle cx="130" cy="100" r="2" fill="#f093fb" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="382" cy="420" r="2" fill="#f5576c" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
