<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="100" ry="100" fill="url(#bgGrad)"/>

  <!-- Abstract scaffold - simplified -->
  <line x1="170" y1="140" x2="170" y2="380" stroke="url(#barGrad)" stroke-width="10" stroke-linecap="round"/>
  <line x1="342" y1="140" x2="342" y2="380" stroke="url(#barGrad)" stroke-width="10" stroke-linecap="round"/>
  <line x1="170" y1="200" x2="342" y2="200" stroke="#3fb950" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <line x1="170" y1="300" x2="342" y2="300" stroke="#3fb950" stroke-width="5" stroke-linecap="round" opacity="0.4"/>

  <!-- Large S symbol -->
  <text x="256" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="190" font-weight="900" fill="url(#sGrad)" text-anchor="middle" dominant-baseline="central" filter="url(#glow)">S</text>

  <!-- Dots for tech feel -->
  <circle cx="256" cy="120" r="4" fill="#58a6ff" opacity="0.6"/>
  <circle cx="256" cy="460" r="4" fill="#3fb950" opacity="0.6"/>
</svg>
