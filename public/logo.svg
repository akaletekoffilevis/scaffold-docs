<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect x="16" y="16" width="480" height="480" rx="100" ry="100" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Scaffold structure -->
  <line x1="160" y1="130" x2="160" y2="400" stroke="url(#barGrad)" stroke-width="12" stroke-linecap="round"/>
  <line x1="256" y1="130" x2="256" y2="400" stroke="url(#barGrad)" stroke-width="8" stroke-linecap="round"/>
  <line x1="352" y1="130" x2="352" y2="400" stroke="url(#barGrad)" stroke-width="12" stroke-linecap="round"/>

  <line x1="160" y1="180" x2="352" y2="180" stroke="#00d4ff" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <line x1="160" y1="265" x2="352" y2="265" stroke="#00d4ff" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <line x1="160" y1="350" x2="352" y2="350" stroke="#00d4ff" stroke-width="6" stroke-linecap="round" opacity="0.5"/>

  <line x1="160" y1="180" x2="256" y2="265" stroke="#7b2ff7" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <line x1="256" y1="180" x2="160" y2="265" stroke="#7b2ff7" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <line x1="256" y1="265" x2="352" y2="350" stroke="#7b2ff7" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <line x1="352" y1="265" x2="256" y2="350" stroke="#7b2ff7" stroke-width="4" stroke-linecap="round" opacity="0.4"/>

  <!-- S letter -->
  <text x="256" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="170" font-weight="900" fill="url(#sGrad)" text-anchor="middle" dominant-baseline="central" filter="url(#glow)">S</text>

  <!-- Terminal cursor -->
  <rect x="318" y="205" width="6" height="36" rx="3" fill="#00d4ff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
