<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Scaffold icon -->
  <g transform="translate(50, 20)">
    <line x1="40" y1="30" x2="40" y2="240" stroke="url(#barGrad)" stroke-width="8" stroke-linecap="round"/>
    <line x1="110" y1="30" x2="110" y2="240" stroke="url(#barGrad)" stroke-width="5" stroke-linecap="round"/>
    <line x1="180" y1="30" x2="180" y2="240" stroke="url(#barGrad)" stroke-width="8" stroke-linecap="round"/>

    <line x1="40" y1="70" x2="180" y2="70" stroke="#00d4ff" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <line x1="40" y1="130" x2="180" y2="130" stroke="#00d4ff" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <line x1="40" y1="190" x2="180" y2="190" stroke="#00d4ff" stroke-width="4" stroke-linecap="round" opacity="0.4"/>

    <line x1="40" y1="70" x2="110" y2="130" stroke="#7b2ff7" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <line x1="110" y1="70" x2="40" y2="130" stroke="#7b2ff7" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <line x1="110" y1="130" x2="180" y2="190" stroke="#7b2ff7" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <line x1="180" y1="130" x2="110" y2="190" stroke="#7b2ff7" stroke-width="3" stroke-linecap="round" opacity="0.3"/>

    <text x="110" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="100" font-weight="900" fill="url(#sGrad)" text-anchor="middle" dominant-baseline="central" filter="url(#glow)">S</text>

    <rect x="155" y="105" width="4" height="24" rx="2" fill="#00d4ff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Text -->
  <g transform="translate(280, 95)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#e6edf3">Scaffolder</text>
    <text x="0" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#8b949e" font-weight="400">CLI de generation de projets</text>
  </g>
</svg>
